rules:
  completeness:
    check_missing_values:
      - column: id
        allowed_null_percentage: 0
      - column: name
        allowed_null_percentage: 0
  accuracy:
    check_format:
      - column: email
        regex: ^(0|84)[0-9]{9}$
      - column: phone_number
        regex: ^[\w\.-]+@[\w\.-]+\.\w+$
    check_range: []
    check_allowed_values: []
  consistency:
    check_logic:
      - rule_name: check_age_birthday_past
        condition: birthday < today
