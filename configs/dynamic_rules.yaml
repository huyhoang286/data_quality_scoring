rules:
  completeness:
    check_missing_values:
      - column: Transaction ID
        allowed_null_percentage: 0
      - column: Item
        allowed_null_percentage: 0
      - column: Payment Method
        allowed_null_percentage: 0
      - column: Location
        allowed_null_percentage: 0
      - column: Transaction Date
        allowed_null_percentage: 0
  accuracy:
    check_format: []
    check_range:
      - column: Quantity
        min: 0.01
      - column: Price Per Unit
        min: 0.01
      - column: Total Spent
        min: 0.01
    check_allowed_values: []
  consistency:
    check_logic: []
